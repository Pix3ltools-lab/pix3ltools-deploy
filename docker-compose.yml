services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8080:8080"
    volumes:
      - db-data:/var/lib/sqld
    environment:
      - SQLD_NODE=primary

  pix3lboard:
    image: ghcr.io/pix3ltools-lab/pix3lboard:latest
    ports:
      - "3000:3000"
    depends_on:
      - sqld
    volumes:
      - blob-storage:/data/blob-storage
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=pix3lboard
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_PIX3LWIKI_URL=http://localhost:3001
      - TURSO_DATABASE_URL=http://sqld:8080
      - TURSO_AUTH_TOKEN=
      - JWT_SECRET=${JWT_SECRET}
      - STORAGE_PROVIDER=local
      - LOCAL_STORAGE_PATH=/data/blob-storage
      - PIX3LPROMPT_URL=http://localhost:3002

  pix3lprompt:
    image: ghcr.io/pix3ltools-lab/pix3lprompt:latest
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production

  pix3lwiki:
    image: ghcr.io/pix3ltools-lab/pix3lwiki:latest
    ports:
      - "3001:3001"
    depends_on:
      - sqld
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_VERSION=1.2.0
      - NEXT_PUBLIC_PIX3LBOARD_URL=http://localhost:3000
      - TURSO_DATABASE_URL=http://sqld:8080
      - TURSO_AUTH_TOKEN=
      - JWT_SECRET=${JWT_SECRET}

  pix3lmcp:
    image: ghcr.io/pix3ltools-lab/pix3lmcp:latest
    ports:
      - "3010:3010"
    depends_on:
      - pix3lboard
    environment:
      - NODE_ENV=production
      - PIX3LBOARD_URL=http://pix3lboard:3000
      # Opzione 1 (preferita): API Key — decommentare quando pix3lboard la supporta via setup
      # - PIX3LBOARD_API_KEY=${PIX3LBOARD_MCP_API_KEY}
      # Opzione 2 (fallback): Email + Password
      - PIX3LBOARD_EMAIL=${PIX3LBOARD_MCP_EMAIL}
      - PIX3LBOARD_PASSWORD=${PIX3LBOARD_MCP_PASSWORD}
      - WORKSPACE_IDS=${PIX3LBOARD_MCP_WORKSPACE_IDS}
      - PORT=3010

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_MONITOR_ONLY=true  # security: detect updates but do not apply them automatically

volumes:
  db-data:
  blob-storage:
